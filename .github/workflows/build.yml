name: Build Amethyst

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: brew install ldid xz dpkg

      - name: Setup Theos
        run: git clone --depth=1 --recursive https://github.com/theos/theos.git "$THEOS"

      - name: Download iOS SDK
        run: |
          rm -rf "$THEOS/sdks"
          git clone --depth=1 https://github.com/theos/sdks.git "$THEOS/sdks"

      - name: Build sideload dylib
        run: make 2>&1 | tee build.log

      - name: Package for Sideloadly injection
        run: |
          set -eu
          mkdir -p packages/inject
          find .theos -type f -name '*.dylib' -print
          DYLIB="$(find .theos -type f \( -name 'libAmethyst.dylib' -o -name 'Amethyst.dylib' \) -print -quit || true)"
          if [ -z "$DYLIB" ]; then
            echo "Amethyst dylib not found under .theos"
            tail -100 build.log || true
            exit 1
          fi
          echo "Using dylib: $DYLIB"
          cp "$DYLIB" packages/inject/Amethyst.dylib
          install_name_tool -id @executable_path/Frameworks/Amethyst.dylib packages/inject/Amethyst.dylib
          python3 scripts/build_deb.py --dylib packages/inject/Amethyst.dylib
          ls -la packages packages/inject

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-deb
          path: |
            packages/com.amethyst.menu_1.1.0_iphoneos-arm64.deb
            packages/inject/Amethyst.dylib
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
