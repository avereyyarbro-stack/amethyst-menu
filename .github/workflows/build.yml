name: Build Amethyst

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: brew install ldid xz dpkg

      - name: Setup Theos
        run: git clone --depth=1 --recursive https://github.com/theos/theos.git "$THEOS"

      - name: Download iOS SDK
        run: |
          rm -rf "$THEOS/sdks"
          git clone --depth=1 https://github.com/theos/sdks.git "$THEOS/sdks"

      - name: Build sideload dylib
        run: |
          set -o pipefail
          make package FINALPACKAGE=1 2>&1 | tee build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "===== BUILD LOG ====="
            cat build.log
            exit 1
          fi
          find .theos -type f -name '*.dylib' -exec ls -la {} \;

      - name: Package .deb for injection
        run: |
          mkdir -p packages/inject
          DYLIB="$(find .theos -type f -name 'Amethyst.dylib' | head -n1)"
          if [ -z "$DYLIB" ]; then
            echo "Amethyst.dylib not found"
            find .theos -type f
            exit 1
          fi
          cp "$DYLIB" packages/inject/Amethyst.dylib
          install_name_tool -id @executable_path/Frameworks/Amethyst.dylib packages/inject/Amethyst.dylib || true
          python3 scripts/build_deb.py --dylib packages/inject/Amethyst.dylib

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-deb
          path: |
            packages/com.amethyst.menu_1.1.0_iphoneos-arm64.deb
            packages/inject/Amethyst.dylib
          if-no-files-found: error
